<html lang="ar" dir="rtl">
<head>

<style>
:root{--bg:#060a12;--panel:#0b1320;--panel2:#101a2a;--line:rgba(0,212,255,.16);--text:#eaf4fb;--muted:#8094aa;--cyan:#00d4ff;--danger:#ff5470;--pageW:210mm;--pageH:297mm}*{box-sizing:border-box}html,body,#app{height:100%;margin:0}body{font-family:"IBM Plex Sans Arabic","Segoe UI",Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}button,input,select,textarea{font:inherit}button{cursor:pointer}.shell{height:100%;display:grid;grid-template-rows:52px 1fr}.top{height:52px;display:flex;align-items:center;gap:10px;padding:0 14px;background:linear-gradient(180deg,#0d1726,#09101b);border-bottom:1px solid var(--line)}.brand{font-weight:900}.dot{display:inline-block;width:20px;height:20px;border-radius:50%;margin-inline-start:8px;vertical-align:middle;background:conic-gradient(from 20deg,transparent 0 18%,var(--cyan) 19% 28%,transparent 29% 43%,var(--cyan) 44% 53%,transparent 54%);box-shadow:0 0 16px rgba(0,212,255,.35)}.grow{flex:1}.app{height:calc(100vh - 52px);display:grid;grid-template-columns:330px minmax(640px,1fr) 390px;min-width:1280px}.side{overflow:auto;padding:12px;background:var(--panel);border-inline-end:1px solid var(--line);scrollbar-width:none}.side.right{border-inline-end:0;border-inline-start:1px solid var(--line)}.side::-webkit-scrollbar,.work::-webkit-scrollbar{display:none}.work{overflow:auto;padding:24px 0 80px;background:radial-gradient(circle at 50% 0,rgba(0,212,255,.06),transparent 34%),#070b13}.canvas{display:flex;flex-direction:column;gap:28px;align-items:center}.btn,.tool{border:1px solid var(--line);border-radius:10px;background:var(--panel2);color:var(--text);padding:8px 10px;font-size:12px;min-height:35px}.btn:hover,.tool:hover{border-color:var(--cyan);color:var(--cyan)}.btn.primary{background:var(--cyan);color:#04131d;border-color:var(--cyan);font-weight:900}.btn.danger:hover{border-color:var(--danger);color:var(--danger)}.acc{border:1px solid var(--line);border-radius:14px;background:rgba(16,26,42,.75);margin-bottom:10px;overflow:hidden}.acc summary{list-style:none;padding:12px 13px;font-size:12px;font-weight:900;color:#e0f7ff;display:flex;justify-content:space-between}.acc summary::-webkit-details-marker{display:none}.acc summary:after{content:'+';color:var(--cyan)}.acc[open] summary:after{content:'−'}.body{padding:0 12px 12px;border-top:1px solid rgba(0,212,255,.08)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}.row{display:flex;gap:8px;align-items:center;margin-bottom:8px}.row>*{flex:1}.field,select,textarea{width:100%;border:1px solid var(--line);border-radius:9px;background:#0c1727;color:var(--text);padding:8px;font-size:12px}textarea{min-height:78px;resize:vertical;line-height:1.6}.small{font-size:11px;color:var(--muted);line-height:1.7}.hint{font-size:11px;color:var(--muted);border:1px dashed var(--line);border-radius:12px;padding:10px;line-height:1.7}.tool{min-height:52px;text-align:right;display:flex;flex-direction:column;gap:3px}.tool small{color:var(--muted);font-size:10px}.seg{display:grid;grid-template-columns:repeat(var(--n,2),1fr);gap:6px}.seg button.active{border-color:var(--cyan);background:rgba(0,212,255,.1);color:var(--cyan)}label{display:block;margin:8px 0}.label{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;margin-bottom:5px}.page{width:var(--pageW);height:var(--pageH);position:relative;flex:none;display:flex;flex-direction:column;background:var(--pBg);color:var(--pText);border:1px solid var(--pBorder);box-shadow:0 18px 55px rgba(0,0,0,.56);overflow:hidden}.page.selected{outline:2px solid var(--cyan)}.page.grid:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,var(--grid)) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,var(--grid)) 1px,transparent 1px);background-size:22mm 22mm;pointer-events:none}.head,.foot{height:var(--headH);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:0 var(--padX);border-bottom:1px solid var(--accent);font-size:9.5px;z-index:2}.foot{height:var(--footH);border-top:1px solid var(--pBorder);border-bottom:0;color:var(--muted);grid-template-columns:1fr 1fr 1fr}.head.hide,.foot.hide{display:none}.hc,.foot span:nth-child(2){text-align:center}.hr,.foot span:nth-child(3){text-align:left}.logo{justify-self:end;display:flex;align-items:center;gap:7px;direction:ltr}.mark{width:12mm;height:12mm;border-radius:50%;background:conic-gradient(from 20deg,transparent 0 18%,var(--accent) 19% 28%,transparent 29% 43%,var(--accent) 44% 53%,transparent 54%)}.content{flex:1;min-height:0;padding:var(--padY) var(--padX);z-index:1}.blk{position:relative;margin-bottom:var(--after);padding:var(--pad);border:1px solid transparent;border-radius:var(--radius);text-align:var(--align);background:var(--bBg);max-width:var(--bw);margin-inline-start:var(--ms);margin-inline-end:var(--me)}.blk:hover,.blk.sel{border-color:var(--accent);box-shadow:0 0 0 1px rgba(0,212,255,.18)}.blk [contenteditable]:focus{outline:0}.tag{display:none;position:absolute;top:-20px;right:8px;background:#06101d;border:1px solid var(--accent);color:var(--accent);border-radius:999px;padding:2px 8px;font-size:9px}.blk.sel .tag{display:block}.btools{display:none;position:absolute;top:-20px;left:6px;gap:4px;z-index:5}.blk.sel .btools{display:flex}.btools button{border:1px solid var(--line);background:#07101b;color:var(--text);border-radius:8px;font-size:10px;padding:3px 7px}h1,h2,p{margin:0}.title{font-size:var(--fs);line-height:var(--lh);font-weight:var(--weight);color:var(--color)}.para,.note{font-size:var(--fs);line-height:var(--lh);font-weight:var(--weight);color:var(--color);white-space:pre-wrap}.eyebrow{display:inline-flex;gap:8px;align-items:center;color:var(--accent);font-size:var(--fs);font-weight:900;letter-spacing:var(--ls);direction:ltr}.eyebrow:before{content:"";width:22mm;height:1px;background:var(--accent)}.note{padding:0}.blk.accentLine{border-inline-end:2mm solid var(--accent)}.table{width:var(--tw);border-collapse:separate;border-spacing:0;font-size:var(--tfs);margin-inline:auto;border-radius:var(--tr);overflow:hidden}.table th,.table td{padding:var(--tcp);border-bottom:var(--tb);text-align:var(--ta);vertical-align:top}.table th{background:var(--thbg);color:var(--thc);font-weight:var(--thw)}.table td{background:var(--card);color:var(--pText)}.table.zebra tr:nth-child(even) td{background:color-mix(in srgb,var(--card),var(--accent) 6%)}.divider{height:1px;background:var(--pBorder)}.spacer{height:var(--space)}.metrics{display:grid;grid-template-columns:repeat(var(--cols),1fr);gap:4mm}.metric{border:1px solid var(--pBorder);background:var(--card);border-radius:12px;padding:5mm}.metric .n{font-size:20pt;font-weight:900;color:var(--accent);direction:ltr}.metric .l{font-size:8pt;color:var(--muted)}.coverHero{min-height:95mm;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6mm}.coverHero .k{color:var(--accent);letter-spacing:4px;font-size:8pt;font-weight:900;direction:ltr}.coverHero h1{font-size:28pt;line-height:1.35}.coverHero p{font-size:10pt;line-height:1.9;max-width:110mm}.empty{padding:26px;border:1px dashed var(--line);border-radius:14px;color:var(--muted);text-align:center;line-height:1.8}@page{size:A4;margin:0}@media print{body{background:#fff;overflow:visible}.top,.side,.btools,.tag{display:none!important}.shell,.app{display:block;height:auto;min-width:0}.work{overflow:visible;padding:0;background:#fff}.canvas{display:block}.page{box-shadow:none;border:0;outline:0!important;width:210mm;height:297mm;break-after:page}.page:last-child{break-after:auto}.blk{break-inside:avoid;border-color:transparent!important}.page,.head,.foot,.table th,.table td,.metric,.note{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>
<body><div id="app"></div><script>
(function(){
const root=document.getElementById('app'),LS='nas_docpdf_stable_v3',uid=()=>Math.random().toString(36).slice(2,9),copy=x=>JSON.parse(JSON.stringify(x));
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
let selPage=0,selBlock=null,mode='add',state=load();
function baseDoc(){return{pageSize:'A4',orientation:'portrait',direction:'rtl',colors:{accent:'#00d4ff',text:'#111820',border:'#dbe4ea'},visual:{grid:true,gridOpacity:.035},geometry:{mx:16,my:14,head:14,foot:10},header:{enabled:true,logo:true,left:true,center:true,right:true},footer:{enabled:true,page:true,center:true,contact:true},export:{filename:'nas-codeworks-document'}}}
function txt(fs=11){return{dir:'rtl',fs,weight:400,lh:1.75,align:'right',width:'full',pos:'start',after:6,pad:0,radius:10,bg:false,accent:false,color:'default',ls:0}}
function page(dark=false){return{id:uid(),dark,blocks:[]}}
function block(t){let b={id:uid(),type:t,content:{text:''},settings:txt()};if(t==='h1'){b.content.text='عنوان رئيسي جديد';b.settings=txt(26);b.settings.weight=800;b.settings.lh=1.35;b.settings.after=8}if(t==='subtitle'){b.content.text='عنوان فرعي';b.settings=txt(16);b.settings.weight=700}if(t==='paragraph'){b.content.text='اكتب فقرة واضحة هنا.'}if(t==='eyebrow'){b.content.text='COMMERCIAL INFRASTRUCTURE DOCUMENT';b.settings=txt(8);b.settings.dir='ltr';b.settings.weight=900;b.settings.ls=4;b.settings.color='accent'}if(t==='note'){b.content.text='ملاحظة مهمة داخل المستند.';b.settings.bg=true;b.settings.accent=true;b.settings.pad=5;b.settings.after=8}if(t==='terms'){b.content.text='تحدد التفاصيل النهائية بعد فهم النطاق وطريقة العمل الحالية.';b.settings.fs=10;b.settings.lh=1.9}if(t==='table'||t==='pricing'){b.content={rows:[['الخدمة','الوصف','السعر'],['تطبيقات سطح مكتب','أداة داخلية مخصصة','يبدأ من 500$'],['أرشفة وإدارة ملفات','تنظيم ملفات ومعلومات','يبدأ من 900$']]};b.settings={header:true,footer:false,density:'normal',zebra:false,borders:'soft',align:'right',width:100,pad:3,fs:10,rounded:10,headWeight:800,headBg:'#0d2b48',headColor:'#ffffff',after:7}}if(t==='metrics'){b.content={items:[['A4 PDF','Export'],['Defined','Scope'],['RTL','Arabic first']]};b.settings={cols:3,after:8}}if(t==='coverHero'){b.content={kicker:'COMMERCIAL INFRASTRUCTURE DOCUMENT',title:'جدول الخدمات والباقات التشغيلية',text:'وثيقة أسعار مرجعية لخدمات NAS CodeWorks حسب فهم المشكلة والنطاق قبل التنفيذ.'};b.settings={after:8}}if(t==='divider'){b.content={};b.settings={after:6}}if(t==='spacer'){b.content={};b.settings={height:12,after:0}}if(t==='card'){b.content={title:'بطاقة خدمة',text:'وصف مختصر للعنصر أو الخدمة.'};b.settings=txt(11);b.settings.bg=true;b.settings.pad=5;b.settings.after=7}return b}
function starter(){let p1=page(true),p2=page(false),p3=page(false);p1.blocks=[block('eyebrow'),block('coverHero'),block('metrics')];p2.blocks=[block('eyebrow'),block('h1'),block('pricing'),block('note')];p2.blocks[1].content.text='الأسعار المرجعية';p2.blocks[3].content.text='قاعدة التسعير: السعر لا يعتمد على عدد الشاشات فقط، بل على وضوح المشكلة، مصادر البيانات، وعدد المستخدمين.';p3.blocks=[block('eyebrow'),block('h1'),block('table')];p3.blocks[0].content.text='GENERAL TERMS';p3.blocks[1].content.text='الأحكام العامة';p3.blocks[2].content.rows=[['البند','التفصيل','الحالة'],['النطاق','يحدد قبل التنفيذ','إلزامي'],['التعديلات','ضمن إطار العمل المتفق عليه','حسب الاتفاق'],['التسليم','اختبار وتشغيل وتوثيق','إلزامي']];return{doc:baseDoc(),pages:[p1,p2,p3]}}
function load(){try{return JSON.parse(localStorage.getItem(LS))||starter()}catch(e){return starter()}}function save(){localStorage.setItem(LS,JSON.stringify(state))}function p(){return state.pages[selPage]}function b(){return p().blocks.find(x=>x.id===selBlock)}function set(o,path,val){let a=path.split('.'),x=o;for(let i=0;i<a.length-1;i++)x=x[a[i]];x[a.at(-1)]=val}function get(o,path){return path.split('.').reduce((x,k)=>x&&x[k],o)}function val(e){return e.type==='checkbox'?e.checked:e.type==='range'||e.type==='number'?+e.value:e.value}
function shell(){root.innerHTML=`<div class="shell"><div class="top"><div class="brand"><span class="dot"></span>NAS <span style="color:var(--cyan)">Document Studio</span></div><span class="small">docpdf · Stable Inspector</span><div class="grow"></div><button class="btn" data-act="addPage">+ صفحة</button><button class="btn" data-add="paragraph">+ فقرة</button><button class="btn" data-add="table">+ جدول</button><button class="btn" data-act="json">JSON</button><button class="btn primary" data-act="print">A4 PDF</button></div><main class="app"><aside class="side" id="left"></aside><section class="work"><div class="canvas" id="canvas"></div></section><aside class="side right" id="right"></aside></main></div>`}
function dctrl(label,path,type='text',extra=''){let v=get(state.doc,path);if(type==='bool')return`<label><div class="label"><span>${label}</span></div><div class="seg"><button class="btn ${v?'active':''}" data-docbool="${path}" data-v="1">تفعيل</button><button class="btn ${!v?'active':''}" data-docbool="${path}" data-v="0">إيقاف</button></div></label>`;if(type==='color')return`<label><div class="label"><span>${label}</span><span>${v}</span></div><input type="color" class="field" value="${v}" data-doc="${path}"></label>`;if(type==='select')return`<label><div class="label"><span>${label}</span></div><select data-doc="${path}">${extra}</select></label>`;return`<label><div class="label"><span>${label}</span><span>${v}</span></div><input class="field" type="${type}" value="${esc(v)}" data-doc="${path}" ${extra}></label>`}
function opts(arr,v){return arr.map(x=>`<option value="${x[0]}" ${String(x[0])===String(v)?'selected':''}>${x[1]}</option>`).join('')}
function left(){let d=state.doc;document.getElementById('left').innerHTML=`<div class="small" style="margin:3px 0 12px">Document Settings Inspector</div><details class="acc" open><summary>Document Preset</summary><div class="body"><div class="seg"><button class="btn active">A4</button><button class="btn">PDF</button></div><div class="hint" style="margin-top:8px">Pages: ${state.pages.length} · Direction: ${d.direction.toUpperCase()}</div></div></details><details class="acc" open><summary>Theme & Visual Style</summary><div class="body">${dctrl('Accent color','colors.accent','color')}${dctrl('Text color','colors.text','color')}${dctrl('Grid visibility','visual.grid','bool')}${dctrl('Grid opacity','visual.gridOpacity','range','min="0" max=".12" step=".005"')}</div></details><details class="acc"><summary>Page Geometry</summary><div class="body">${dctrl('Margin X mm','geometry.mx','range','min="6" max="30"')}${dctrl('Margin Y mm','geometry.my','range','min="6" max="30"')}${dctrl('Header height','geometry.head','range','min="0" max="32"')}${dctrl('Footer height','geometry.foot','range','min="0" max="24"')}</div></details><details class="acc"><summary>Header / Footer</summary><div class="body">${dctrl('Show header','header.enabled','bool')}${dctrl('Show footer','footer.enabled','bool')}${dctrl('Logo','header.logo','bool')}${dctrl('Header left','header.left','bool')}${dctrl('Header center','header.center','bool')}${dctrl('Header right','header.right','bool')}${dctrl('Page number','footer.page','bool')}${dctrl('Contact info','footer.contact','bool')}</div></details><details class="acc"><summary>Export & Quality</summary><div class="body">${dctrl('Filename','export.filename')}<div class="grid2"><button class="btn primary" data-act="print">Export PDF</button><button class="btn" data-act="json">Export JSON</button><button class="btn danger" data-act="reset">Reset</button></div></div></details>`}
function library(){let g=(t,items,open='')=>`<details class="acc" ${open}><summary>${t}</summary><div class="body"><div class="grid2">${items.map(i=>`<button class="tool" data-add="${i[0]}">${i[1]}<small>${i[2]}</small></button>`).join('')}</div></div></details>`;return`${g('Text Blocks',[['h1','Main title','عنوان'],['subtitle','Subtitle','فرعي'],['paragraph','Paragraph','فقرة'],['eyebrow','Label','وسم'],['note','Note box','ملاحظة'],['terms','Terms','أحكام']],'open')}${g('Tables',[['table','Pricing table','أسعار'],['pricing','Service table','خدمات']],'open')}${g('Cards & Metrics',[['metrics','Metric cards','مؤشرات'],['card','Service card','بطاقة']])}${g('Layout Blocks',[['divider','Divider','فاصل'],['spacer','Spacer','مسافة'],['coverHero','Cover hero','غلاف']])}`}
function bctrl(label,path,type='range',extra=''){let x=b(),v=get(x,path);if(type==='bool')return`<label><div class="label"><span>${label}</span></div><div class="seg"><button class="btn ${v?'active':''}" data-bbool="${path}" data-v="1">تفعيل</button><button class="btn ${!v?'active':''}" data-bbool="${path}" data-v="0">إيقاف</button></div></label>`;if(type==='select')return`<label><div class="label"><span>${label}</span></div><select data-block="${path}">${extra}</select></label>`;if(type==='color')return`<label><div class="label"><span>${label}</span><span>${v}</span></div><input type="color" class="field" value="${v}" data-block="${path}"></label>`;return`<label><div class="label"><span>${label}</span><span>${v}</span></div><input class="field" type="${type}" value="${esc(v)}" data-block="${path}" ${extra}></label>`}
function inspector(){let x=b();if(!x)return`<div class="empty">حدد عنصراً من الصفحة لفتح خصائصه.</div>`;let table=x.type==='table'||x.type==='pricing',text=['h1','subtitle','paragraph','eyebrow','note','terms','card'].includes(x.type);return`<details class="acc" open><summary>Selected Element</summary><div class="body"><div class="grid3"><button class="btn" data-ba="up">↑</button><button class="btn" data-ba="down">↓</button><button class="btn" data-ba="dup">نسخ</button></div><div class="grid2" style="margin-top:8px"><button class="btn" data-ba="reset">Reset</button><button class="btn danger" data-ba="del">Delete</button></div><div class="hint" style="margin-top:8px">${x.type} · ${x.id}</div></div></details>${contentPanel(x,table)}${text?`<details class="acc" open><summary>Paragraph / Typography</summary><div class="body">${bctrl('Direction','settings.dir','select',opts([['rtl','RTL Arabic'],['ltr','LTR English']],x.settings.dir))}${bctrl('Font size','settings.fs','range','min="7" max="42" step=".5"')}${bctrl('Font weight','settings.weight','select',opts([[300,'300'],[400,'400'],[600,'600'],[700,'700'],[800,'800'],[900,'900']],x.settings.weight))}${bctrl('Line height','settings.lh','range','min="1" max="2.6" step=".05"')}${bctrl('Alignment','settings.align','select',opts([['right','يمين'],['center','وسط'],['left','يسار'],['justify','ضبط']],x.settings.align))}${bctrl('Width','settings.width','select',opts([['auto','Auto'],['narrow','Narrow'],['medium','Medium'],['wide','Wide'],['full','Full']],x.settings.width))}${bctrl('Spacing after','settings.after','range','min="0" max="24"')}${bctrl('Padding','settings.pad','range','min="0" max="12"')}${bctrl('Background','settings.bg','bool')}${bctrl('Accent line','settings.accent','bool')}</div></details>`:''}${table?`<details class="acc" open><summary>Table Structure</summary><div class="body"><div class="grid2"><button class="btn" data-ba="addRow">+ صف</button><button class="btn" data-ba="removeRow">− صف</button><button class="btn" data-ba="addCol">+ عمود</button><button class="btn" data-ba="removeCol">− عمود</button></div>${bctrl('Header row','settings.header','bool')}${bctrl('Footer row','settings.footer','bool')}</div></details><details class="acc" open><summary>Table Style</summary><div class="body">${bctrl('Density','settings.density','select',opts([['compact','Compact'],['normal','Normal'],['spacious','Spacious']],x.settings.density))}${bctrl('Zebra rows','settings.zebra','bool')}${bctrl('Borders','settings.borders','select',opts([['none','None'],['soft','Soft'],['clear','Clear']],x.settings.borders))}${bctrl('Alignment','settings.align','select',opts([['right','Right'],['center','Center'],['left','Left']],x.settings.align))}${bctrl('Width %','settings.width','range','min="50" max="100"')}${bctrl('Cell padding','settings.pad','range','min="1" max="7" step=".5"')}${bctrl('Font size','settings.fs','range','min="7" max="15" step=".5"')}${bctrl('Header bg','settings.headBg','color')}${bctrl('Header color','settings.headColor','color')}</div></details>`:''}`}
function contentPanel(x,table){if(table)return`<details class="acc" open><summary>Content</summary><div class="body"><textarea data-csv placeholder="Paste CSV rows"></textarea><button class="btn" data-ba="paste">Paste rows</button><div class="hint" style="margin-top:8px">يمكن تعديل الخلايا مباشرة داخل الصفحة.</div></div></details>`;if(x.type==='coverHero')return`<details class="acc" open><summary>Content</summary><div class="body"><input class="field" value="${esc(x.content.kicker)}" data-block="content.kicker"><textarea data-block="content.title">${esc(x.content.title)}</textarea><textarea data-block="content.text">${esc(x.content.text)}</textarea></div></details>`;if(x.type==='metrics')return`<details class="acc" open><summary>Content</summary><div class="body"><textarea data-metrics>${x.content.items.map(i=>i.join('|')).join('\n')}</textarea><div class="hint">كل سطر: القيمة | الوصف</div></div></details>`;if(x.type==='card')return`<details class="acc" open><summary>Content</summary><div class="body"><input class="field" value="${esc(x.content.title)}" data-block="content.title"><textarea data-block="content.text">${esc(x.content.text)}</textarea></div></details>`;if(x.content&&'text'in x.content)return`<details class="acc" open><summary>Content</summary><div class="body"><textarea data-block="content.text">${esc(x.content.text)}</textarea></div></details>`;return''}
function right(){document.getElementById('right').innerHTML=`<div class="small" style="margin:3px 0 12px">${mode==='add'?'Block Library':'Element Inspector'}</div><div class="seg" style="margin-bottom:10px"><button class="btn ${mode==='add'?'active':''}" data-mode="add">Add Blocks</button><button class="btn ${mode==='inspect'?'active':''}" data-mode="inspect">Inspector</button></div>${mode==='add'?library():inspector()}`}
function pvars(pg){let d=state.doc,isDark=pg.dark,bg=isDark?'#050910':'#fff',text=isDark?'#e8f3fb':d.colors.text,card=isDark?'#0d1827':'#f7f9fb',border=isDark?'rgba(0,212,255,.24)':d.colors.border;return`--pBg:${bg};--pText:${text};--pBorder:${border};--card:${card};--accent:${d.colors.accent};--muted:${isDark?'#7e91a5':'#748293'};--headH:${d.header.enabled?d.geometry.head:0}mm;--footH:${d.footer.enabled?d.geometry.foot:0}mm;--padX:${d.geometry.mx}mm;--padY:${d.geometry.my}mm;--grid:${d.visual.grid?d.visual.gridOpacity:0}`}
function bvars(x){let s=x.settings||{},wm={auto:'max-content',narrow:'70mm',medium:'105mm',wide:'140mm',full:'100%'},color=s.color==='accent'?'var(--accent)':s.color==='muted'?'var(--muted)':'var(--pText)',bg=s.bg?'rgba(0,212,255,.07)':'transparent';return`--fs:${s.fs||11}pt;--lh:${s.lh||1.6};--weight:${s.weight||400};--align:${s.align||'right'};--after:${s.after??6}mm;--pad:${s.pad?`${s.pad}mm`:'1mm 1.3mm'};--radius:${s.radius||8}px;--bw:${wm[s.width||'full']};--ms:${s.pos==='center'||s.pos==='end'?'auto':'0'};--me:${s.pos==='center'||s.pos==='start'?'auto':'0'};--bBg:${bg};--color:${color};--ls:${s.ls||0}px;--space:${s.height||10}mm`}
function tvars(x){let s=x.settings,p=s.density==='compact'?2:s.density==='spacious'?5:s.pad,b=s.borders==='none'?'0':s.borders==='clear'?'1px solid var(--accent)':'1px solid var(--pBorder)';return`--tw:${s.width}%;--tfs:${s.fs}pt;--tcp:${p}mm;--ta:${s.align};--tb:${b};--tr:${s.rounded}px;--thbg:${s.headBg};--thc:${s.headColor};--thw:${s.headWeight};`}
function preview(){let d=state.doc;document.getElementById('canvas').innerHTML=state.pages.map((pg,pi)=>`<section class="page ${pi===selPage?'selected':''} ${d.visual.grid?'grid':''}" data-page="${pi}" style="${pvars(pg)}">${header()}<div class="content">${pg.blocks.map(x=>wrap(x)).join('')||'<div class="empty">أضف عناصر من Block Library</div>'}</div>${footer(pi)}</section>`).join('')}
function header(){let h=state.doc.header;if(!h.enabled)return'';return`<div class="head"><div style="${h.left?'':'visibility:hidden'}">NAS CodeWorks</div><div class="hc" style="${h.center?'':'visibility:hidden'}">NAS Document Studio</div><div class="hr" style="${h.right?'':'visibility:hidden'}"><div class="logo" style="${h.logo?'':'display:none'}"><div class="mark"></div></div></div></div>`}
function footer(i){let f=state.doc.footer;if(!f.enabled)return'';return`<div class="foot"><span>${f.page?`Page ${i+1} / ${state.pages.length}`:''}</span><span>${f.center?'NAS Document Studio':''}</span><span class="mono">${f.contact?'sufyanaser@gmail.com · +964 770 811 1744':''}</span></div>`}
function wrap(x){return`<div class="blk ${selBlock===x.id?'sel':''} ${x.settings&&x.settings.accent?'accentLine':''}" data-id="${x.id}" style="${bvars(x)}"><div class="tag">${x.type}</div><div class="btools"><button data-ba="up">↑</button><button data-ba="down">↓</button><button data-ba="dup">⧉</button><button data-ba="del">×</button></div>${html(x)}</div>`}
function html(x){let s=x.settings||{},dir=s.dir||state.doc.direction;if(x.type==='h1')return`<h1 class="title" dir="${dir}" contenteditable data-edit="content.text">${esc(x.content.text)}</h1>`;if(x.type==='subtitle')return`<h2 class="title" dir="${dir}" contenteditable data-edit="content.text">${esc(x.content.text)}</h2>`;if(['paragraph','terms'].includes(x.type))return`<p class="para" dir="${dir}" contenteditable data-edit="content.text">${esc(x.content.text)}</p>`;if(x.type==='eyebrow')return`<div class="eyebrow" contenteditable data-edit="content.text">${esc(x.content.text)}</div>`;if(x.type==='note')return`<div class="note para" dir="${dir}" contenteditable data-edit="content.text">${esc(x.content.text)}</div>`;if(x.type==='table'||x.type==='pricing')return table(x);if(x.type==='metrics')return`<div class="metrics" style="--cols:${x.settings.cols}">${x.content.items.map((it,i)=>`<div class="metric"><div class="n" contenteditable data-mi="${i}" data-mc="0">${esc(it[0])}</div><div class="l" contenteditable data-mi="${i}" data-mc="1">${esc(it[1])}</div></div>`).join('')}</div>`;if(x.type==='coverHero')return`<div class="coverHero"><div class="k" contenteditable data-edit="content.kicker">${esc(x.content.kicker)}</div><h1 contenteditable data-edit="content.title">${esc(x.content.title)}</h1><p contenteditable data-edit="content.text">${esc(x.content.text)}</p></div>`;if(x.type==='divider')return`<div class="divider"></div>`;if(x.type==='spacer')return`<div class="spacer"></div>`;if(x.type==='card')return`<div><h2 class="title" contenteditable data-edit="content.title">${esc(x.content.title)}</h2><p class="para" contenteditable data-edit="content.text">${esc(x.content.text)}</p></div>`;return''}
function table(x){return`<table class="table ${x.settings.zebra?'zebra':''}" style="${tvars(x)}"><tbody>${x.content.rows.map((r,ri)=>`<tr>${r.map((c,ci)=>{let tag=x.settings.header&&ri===0?'th':'td';return`<${tag} contenteditable data-ri="${ri}" data-ci="${ci}">${esc(c)}</${tag}>`}).join('')}</tr>`).join('')}</tbody></table>`}
function render(){left();right();preview();save()}
function add(t){let x=block(t);p().blocks.push(x);selBlock=x.id;mode='inspect';render()}
function action(a){let pg=p(),i=pg.blocks.findIndex(x=>x.id===selBlock),x=pg.blocks[i];if(!x)return;if(a==='del'){pg.blocks.splice(i,1);selBlock=null;mode='add'}if(a==='dup'){let n=copy(x);n.id=uid();pg.blocks.splice(i+1,0,n);selBlock=n.id}if(a==='up'&&i>0){[pg.blocks[i-1],pg.blocks[i]]=[pg.blocks[i],pg.blocks[i-1]]}if(a==='down'&&i<pg.blocks.length-1){[pg.blocks[i+1],pg.blocks[i]]=[pg.blocks[i],pg.blocks[i+1]]}if(a==='reset'){let n=block(x.type);x.settings=n.settings}if(x.type==='table'||x.type==='pricing'){let r=x.content.rows;if(a==='addRow')r.push(Array(r[0].length).fill(''));if(a==='removeRow'&&r.length>1)r.pop();if(a==='addCol')r.forEach(row=>row.push(''));if(a==='removeCol'&&r[0].length>1)r.forEach(row=>row.pop());if(a==='paste'){let ta=document.querySelector('[data-csv]');if(ta&&ta.value.trim())x.content.rows=ta.value.trim().split(/\n/).map(line=>line.split(/\t|,/).map(v=>v.trim()))}}render()}
shell();render();
root.addEventListener('click',e=>{let pg=e.target.closest('[data-page]');if(pg)selPage=+pg.dataset.page;let bl=e.target.closest('[data-id]');if(bl){selBlock=bl.dataset.id;mode='inspect'}let addBtn=e.target.closest('[data-add]');if(addBtn){add(addBtn.dataset.add);return}let md=e.target.closest('[data-mode]');if(md){mode=md.dataset.mode;right();return}let db=e.target.closest('[data-docbool]');if(db){set(state.doc,db.dataset.docbool,db.dataset.v==='1');render();return}let bb=e.target.closest('[data-bbool]');if(bb){set(b(),bb.dataset.bbool,bb.dataset.v==='1');render();return}let ba=e.target.closest('[data-ba]');if(ba){action(ba.dataset.ba);return}let act=e.target.closest('[data-act]');if(act){let a=act.dataset.act;if(a==='print')print();if(a==='addPage'){state.pages.push(page(false));selPage=state.pages.length-1;selBlock=null;render()}if(a==='reset'){if(confirm('Reset document?')){state=starter();selPage=0;selBlock=null;mode='add';render()}}if(a==='json'){let link=document.createElement('a');link.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));link.download=(state.doc.export.filename||'nas-doc')+'.json';link.click()}}if(pg||bl)render()});
root.addEventListener('input',e=>{if(e.target.dataset.doc){set(state.doc,e.target.dataset.doc,val(e.target));render();return}if(e.target.dataset.block&&b()){set(b(),e.target.dataset.block,val(e.target));preview();save();return}let edit=e.target.dataset.edit;if(edit){let bl=e.target.closest('[data-id]'),x=p().blocks.find(z=>z.id===bl.dataset.id);set(x,edit,e.target.innerText);save();return}if(e.target.dataset.ri!==undefined){let x=p().blocks.find(z=>z.id===e.target.closest('[data-id]').dataset.id);x.content.rows[+e.target.dataset.ri][+e.target.dataset.ci]=e.target.innerText;save();return}if(e.target.dataset.mi!==undefined){let x=p().blocks.find(z=>z.id===e.target.closest('[data-id]').dataset.id);x.content.items[+e.target.dataset.mi][+e.target.dataset.mc]=e.target.innerText;save();return}if(e.target.dataset.metrics!==undefined&&b()){b().content.items=e.target.value.split(/\n/).filter(Boolean).map(line=>{let a=line.split('|');return[a[0]||'',a[1]||'']});preview();save()}});
})();
</script></body></html>
