<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NAS Document Studio</title>
<style>
:root{
  --ui-bg:#060a12;--ui-panel:#0b1320;--ui-panel2:#101a2a;--ui-border:rgba(0,212,255,.16);
  --ui-text:#e8f3fb;--ui-muted:#7f93a9;--cyan:#00d4ff;--cyan2:#00a8cc;--danger:#ff5470;
  --page-w:210mm;--page-h:297mm;
}
*{box-sizing:border-box} html,body{height:100%;margin:0}
body{font-family:"IBM Plex Sans Arabic","Segoe UI",Tahoma,Arial,sans-serif;background:var(--ui-bg);color:var(--ui-text);overflow:hidden}
button,input,select,textarea{font:inherit}
button{cursor:pointer}.mono{font-family:"IBM Plex Mono",Consolas,monospace;direction:ltr}
#topbar{height:58px;display:flex;align-items:center;gap:10px;padding:0 14px;background:linear-gradient(180deg,#0d1726,#09101b);border-bottom:1px solid var(--ui-border)}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.2px}.mark{width:32px;height:32px;display:grid;place-items:center;border-radius:50%;background:radial-gradient(circle,#0af 0 8%,transparent 9%),conic-gradient(from 30deg,transparent 0 18%,#00d4ff 19% 24%,transparent 25% 38%,#00d4ff 39% 45%,transparent 46%);box-shadow:0 0 22px rgba(0,212,255,.25)}
.sep{height:28px;width:1px;background:var(--ui-border)}.grow{flex:1}.btn{background:var(--ui-panel2);color:var(--ui-text);border:1px solid var(--ui-border);border-radius:10px;padding:8px 11px;font-size:12px}.btn:hover{border-color:var(--cyan);color:var(--cyan)}.btn.primary{background:var(--cyan);color:#04131d;border-color:var(--cyan);font-weight:800}.btn.warn:hover{border-color:var(--danger);color:var(--danger)}
.meta{background:transparent;color:var(--ui-text);border:1px solid transparent;border-radius:8px;padding:7px 8px;min-width:140px}.meta:hover,.meta:focus{outline:none;background:var(--ui-panel2);border-color:var(--ui-border)}
#app{height:calc(100% - 58px);display:grid;grid-template-columns:270px 1fr 320px;min-width:1180px}
.panel{background:var(--ui-panel);border-inline-start:1px solid var(--ui-border);overflow:auto;padding:14px}.panel.left{border-inline-start:0;border-inline-end:1px solid var(--ui-border)}
.panel h3{font-size:11px;color:var(--ui-muted);font-weight:600;letter-spacing:1.4px;margin:16px 0 9px;text-transform:uppercase}.panel h3:first-child{margin-top:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.tool{border:1px solid var(--ui-border);background:var(--ui-panel2);color:var(--ui-text);border-radius:12px;padding:11px 7px;min-height:58px;font-size:12px}.tool:hover{border-color:var(--cyan);color:var(--cyan);transform:translateY(-1px)}
.row{display:flex;gap:8px;align-items:center;margin-bottom:8px}.row>*{flex:1}.field{width:100%;background:var(--ui-panel2);border:1px solid var(--ui-border);border-radius:9px;color:var(--ui-text);padding:8px}.field[type=color]{height:38px;padding:3px}.small{font-size:11px;color:var(--ui-muted);line-height:1.7}.hint{border:1px dashed var(--ui-border);border-radius:12px;padding:10px;color:var(--ui-muted);font-size:11px;line-height:1.7}
#canvasWrap{overflow:auto;padding:32px 0 90px;background:radial-gradient(circle at 50% 0,rgba(0,212,255,.05),transparent 34%),#070b13}#canvas{display:flex;flex-direction:column;align-items:center;gap:28px}
.page{width:var(--page-w);height:var(--page-h);position:relative;flex:none;display:flex;flex-direction:column;box-shadow:0 18px 55px rgba(0,0,0,.62);background:var(--p-bg);color:var(--p-text);border:1px solid color-mix(in srgb,var(--p-border),transparent 15%);overflow:hidden}
.page.grid::before{content:"";position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(var(--p-grid) 1px,transparent 1px),linear-gradient(90deg,var(--p-grid) 1px,transparent 1px);background-size:22mm 22mm;opacity:.55}.page.cover::after{content:"";position:absolute;inset:auto -80mm -80mm auto;width:180mm;height:180mm;border-radius:50%;background:radial-gradient(circle, color-mix(in srgb,var(--p-accent),transparent 50%), transparent 58%);opacity:.22;pointer-events:none}
.page.selected{outline:2px solid var(--cyan)}.page.overflow{outline:3px solid var(--danger)}.badgeOverflow{display:none;position:absolute;top:8px;right:8px;background:var(--danger);color:#fff;font-size:10px;border-radius:999px;padding:3px 9px;z-index:20}.page.overflow .badgeOverflow{display:block}.pageCtl{position:absolute;top:8px;left:8px;display:flex;gap:5px;z-index:20;opacity:0}.page:hover .pageCtl{opacity:1}.pageCtl button{font-size:10px;border-radius:999px;border:1px solid var(--ui-border);background:#07101b;color:#e8f3fb;padding:3px 8px}
.pHead{height:var(--header-h);display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 var(--pad-x);background:var(--h-bg);color:var(--h-text);border-bottom:var(--h-border-w) solid var(--h-border);position:relative;z-index:2}.pHead.hide{display:none}.pFoot{height:var(--footer-h);display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 var(--pad-x);background:var(--f-bg);color:var(--f-text);border-top:var(--f-border-w) solid var(--f-border);font-size:9.5px;position:relative;z-index:2}.pFoot.hide{display:none}.logoText{display:flex;align-items:center;gap:8px;font-weight:800}.cwLogo{display:flex;align-items:center;gap:8px;direction:ltr}.cwMark{width:30px;height:30px;border-radius:50%;background:conic-gradient(from 20deg,transparent 0 18%,var(--p-accent) 19% 27%,transparent 28% 43%,var(--p-accent) 44% 53%,transparent 54%);box-shadow:0 0 14px color-mix(in srgb,var(--p-accent),transparent 50%)}.cwLogo b{font-size:14px}.cwLogo span{color:var(--p-accent)}.hMeta{font-size:10px;line-height:1.5;color:inherit;opacity:.76}.hCenter{font-size:11px;color:inherit;opacity:.72;text-align:center}.pCont{flex:1;min-height:0;padding:var(--pad-y) var(--pad-x);position:relative;z-index:1}.pCont > .blk:last-child{margin-bottom:0}
.blk{position:relative;margin-bottom:5mm;padding:1mm 1.4mm;border:1px solid transparent;border-radius:5px}.blk:hover{border-color:color-mix(in srgb,var(--p-accent),transparent 45%)}.blk.sel{border-color:var(--p-accent)}.blk [contenteditable]:focus{outline:none}.blk [contenteditable]:empty:before{content:attr(data-ph);color:var(--p-muted);opacity:.65}.bTool{display:none;position:absolute;top:-15px;left:4px;gap:4px;z-index:5}.blk.sel .bTool{display:flex}.bTool button{width:24px;height:24px;border-radius:7px;border:1px solid var(--ui-border);background:#07101b;color:#e8f3fb;font-size:11px}
.kicker{display:inline-flex;align-items:center;gap:8px;color:var(--p-accent);font-size:9pt;letter-spacing:3px;text-transform:uppercase;font-weight:700}.kicker:before{content:"";width:24mm;height:1px;background:var(--p-accent)}
.blk-h1 h1{font-size:25pt;line-height:1.25;margin:0;color:var(--p-title);font-weight:800}.blk-h2 h2{font-size:16pt;line-height:1.4;margin:0;color:var(--p-title);font-weight:800}.blk-p p{font-size:10.7pt;line-height:1.9;margin:0;color:var(--p-text)}
.blk-field{display:flex;gap:8mm;align-items:baseline}.blk-field .fLabel{min-width:34mm;color:var(--p-accent);font-weight:800}.blk-field .fValue{flex:1;border-bottom:1px dotted var(--p-border);padding-bottom:1mm}.note{padding:5mm;border-radius:12px;background:var(--p-soft);border-inline-end:2mm solid var(--p-accent);line-height:1.8}.note b{color:var(--p-title)}
.table{width:100%;border-collapse:separate;border-spacing:0;font-size:9.6pt;overflow:hidden;border-radius:10px}.table th{background:var(--p-table-head);color:var(--p-table-head-text);padding:3mm;border:0;text-align:right}.table td{padding:2.7mm 3mm;border-bottom:1px solid var(--p-border);background:var(--p-table-cell)}.table tr:last-child td{border-bottom:0}.table .num{font-weight:800;color:var(--p-accent)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:3mm}.metric{border:1px solid var(--p-border);background:var(--p-card);border-radius:12px;padding:5mm;min-height:26mm}.metric .n{font-size:20pt;font-weight:800;color:var(--p-title);direction:ltr}.metric .l{font-size:8pt;color:var(--p-muted);margin-top:2mm}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:4mm}.card{border:1px solid var(--p-border);background:var(--p-card);border-radius:13px;padding:5mm;min-height:40mm}.card .num{display:inline-grid;place-items:center;width:7mm;height:7mm;border-radius:50%;background:var(--p-accent);color:var(--p-accent-text);font-weight:800;margin-inline-start:2mm}.card h3{font-size:12.5pt;margin:0 0 4mm;color:var(--p-title)}.card p{font-size:9.3pt;line-height:1.75;margin:0;color:var(--p-text)}
.pricing{display:grid;grid-template-columns:repeat(3,1fr);gap:5mm}.priceCard{border:1px solid var(--p-border);background:var(--p-card);border-radius:13px;overflow:hidden}.priceCard h3{background:var(--p-table-head);color:var(--p-table-head-text);padding:5mm;margin:0}.priceCard .price{font-size:20pt;font-weight:800;color:var(--p-title);padding:7mm 5mm 2mm}.priceCard p{padding:0 5mm 5mm;margin:0;color:var(--p-muted);font-size:9pt;line-height:1.8}.compare{border:1px solid var(--p-border);background:var(--p-card);border-radius:16px;padding:6mm}.compareRow{display:grid;grid-template-columns:1fr 18mm 1fr;gap:3mm;border-bottom:1px solid var(--p-border);padding:3mm 0;font-size:9.5pt}.compareRow:last-child{border-bottom:0}.delta{color:var(--p-accent);font-weight:800;text-align:center;direction:ltr}.barList{display:grid;gap:3mm}.barRow{display:grid;grid-template-columns:18mm 1fr 18mm;gap:4mm;align-items:center;font-size:9pt}.barTrack{height:7mm;background:var(--p-soft);border-radius:999px;overflow:hidden}.barFill{height:100%;background:linear-gradient(90deg,var(--p-accent),var(--p-hot));border-radius:999px}.spacer{height:var(--spacer-h)}
@page{size:A4;margin:0}@media print{body{background:#fff;overflow:visible}#topbar,.panel,.pageCtl,.bTool,.badgeOverflow{display:none!important}#app{display:block;height:auto;min-width:0}#canvasWrap{overflow:visible;padding:0;background:#fff}#canvas{display:block}.page{box-shadow:none;border:0;outline:0!important;width:210mm;height:297mm;break-after:page}.page:last-child{break-after:auto}.blk{break-inside:avoid;border-color:transparent!important}.page.grid:before{-webkit-print-color-adjust:exact;print-color-adjust:exact}.page,.pHead,.pFoot,.table th,.card,.metric,.note{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>
<body>
<header id="topbar">
  <div class="brand"><div class="mark"></div><div>NAS <span style="color:var(--cyan)">Document Studio</span></div></div><div class="sep"></div>
  <input id="docTitle" class="meta" placeholder="عنوان المستند" />
  <input id="docNo" class="meta mono" placeholder="NCW/2026/001" />
  <input id="docDate" class="meta mono" placeholder="YYYY-MM-DD" />
  <div class="grow"></div>
  <button class="btn" id="btnTplProposal">قالب CodeWorks</button><button class="btn" id="btnTplRate">قالب تجاري</button>
  <div class="sep"></div><button class="btn" id="btnJsonOut">⬇ JSON</button><button class="btn" id="btnJsonIn">⬆ JSON</button><input id="jsonFile" type="file" hidden accept=".json" />
  <button class="btn primary" id="btnPrint">Export A4 PDF</button>
</header>
<main id="app">
  <aside class="panel left">
    <h3>البلوكات</h3><div class="grid2" id="palette"></div>
    <h3>الصفحات</h3><div class="row"><button class="btn" id="addPage">+ صفحة</button><button class="btn warn" id="delPage">حذف</button></div>
    <div class="row"><button class="btn" id="dupPage">نسخ</button><button class="btn" id="resetDoc">جديد</button></div>
    <h3>ملاحظات</h3><div class="hint">الواجهة داكنة دائماً. كل صفحة لها ألوانها المستقلة. اختر الصفحة ثم عدّل Style/Header/Footer من اللوحة اليمنى. الحفظ تلقائي.</div>
  </aside>
  <section id="canvasWrap"><div id="canvas"></div></section>
  <aside class="panel">
    <h3>Page Style</h3>
    <select id="preset" class="field"></select>
    <div class="row"><button class="btn" id="applyPreset">تطبيق</button><button class="btn" id="applyStyleAll">Style لكل الصفحات</button></div>
    <div class="row"><label class="small">خلفية<input id="stBg" type="color" class="field"></label><label class="small">النص<input id="stText" type="color" class="field"></label></div>
    <div class="row"><label class="small">Accent<input id="stAccent" type="color" class="field"></label><label class="small">العناوين<input id="stTitle" type="color" class="field"></label></div>
    <div class="row"><button class="btn" id="toggleGrid">Grid</button><button class="btn" id="toggleCover">Cover Aura</button></div>
    <h3>Header</h3>
    <div class="row"><button class="btn" id="toggleHeader">إظهار/إخفاء</button><button class="btn" id="applyHeaderAll">Header لكل الصفحات</button></div>
    <input id="hLeft" class="field" placeholder="يسار الهيدر" /><input id="hCenter" class="field" placeholder="وسط الهيدر" /><input id="hRight" class="field" placeholder="يمين الهيدر" />
    <h3>Footer</h3>
    <div class="row"><button class="btn" id="toggleFooter">إظهار/إخفاء</button><button class="btn" id="applyFooterAll">Footer لكل الصفحات</button></div>
    <input id="fLeft" class="field" placeholder="يسار الفوتر" /><input id="fCenter" class="field" placeholder="وسط الفوتر" /><input id="fRight" class="field" placeholder="يمين الفوتر" />
    <h3>Selected Block</h3><div class="row"><button class="btn" id="blockUp">أعلى</button><button class="btn" id="blockDown">أسفل</button><button class="btn warn" id="blockDelete">حذف</button></div>
  </aside>
</main>
<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const LS='nas_document_studio_v1'; let uidN=1, state, selPage=0, selBlock=null; const uid=()=>`id_${uidN++}`; const today=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
const presets={
  light:{name:'Light Professional',bg:'#f7f8f5',text:'#1a2330',title:'#0a1320',muted:'#667480',accent:'#0f8fb8',hot:'#00d4ff',border:'#d9e1e7',card:'#ffffff',soft:'#eef4f7',tableHead:'#0d2b48',tableHeadText:'#ffffff',grid:'rgba(13,43,72,.055)'},
  minimal:{name:'Minimal White',bg:'#ffffff',text:'#161a20',title:'#05070a',muted:'#777d85',accent:'#0b5f8a',hot:'#00a8cc',border:'#e2e5e8',card:'#ffffff',soft:'#f4f6f8',tableHead:'#111820',tableHeadText:'#ffffff',grid:'rgba(0,0,0,.035)'},
  dark:{name:'Dark Operational',bg:'#08111e',text:'#e8f3fb',title:'#ffffff',muted:'#87a0b8',accent:'#00d4ff',hot:'#ff5470',border:'rgba(0,212,255,.20)',card:'#0d1827',soft:'rgba(0,212,255,.08)',tableHead:'#062235',tableHeadText:'#e8f3fb',grid:'rgba(0,212,255,.045)'},
  cover:{name:'Cover Dark',bg:'#050910',text:'#dce8f2',title:'#ffffff',muted:'#7e91a5',accent:'#00d4ff',hot:'#7c5cff',border:'rgba(0,212,255,.17)',card:'#0b1320',soft:'rgba(255,255,255,.045)',tableHead:'#071827',tableHeadText:'#ffffff',grid:'rgba(0,212,255,.04)'},
  proposal:{name:'Proposal Cyan',bg:'#07121f',text:'#e8f3fb',title:'#00d4ff',muted:'#83a0b8',accent:'#00d4ff',hot:'#2ee6a8',border:'rgba(0,212,255,.22)',card:'#0c1828',soft:'rgba(0,212,255,.08)',tableHead:'#00d4ff',tableHeadText:'#04131d',grid:'rgba(0,212,255,.04)'}
};
const defaultHeader={enabled:true,h:18,left:'',center:'',right:'NAS CodeWorks'}; const defaultFooter={enabled:true,h:12,left:'Page {page} / {total}',center:'NAS Document Studio',right:'sufyanaser@gmail.com · +964 770 811 1744'};
function page(style='light'){return{id:uid(),style:{...presets[style]},grid:style!=='minimal',cover:style==='cover',header:{...defaultHeader},footer:{...defaultFooter},blocks:[]}}
function block(type,data={}){return{id:uid(),type,data}}
function fresh(){uidN=1;let d={schemaVersion:1,meta:{title:'NAS CodeWorks Proposal',docNo:`NCW/${new Date().getFullYear()}/001`,date:today()},pages:[page('cover')]};d.pages[0].blocks=[block('label',{text:'NAS CODEWORKS · OPERATIONAL DOCUMENT'}),block('h1',{text:'مقترح نظام تشغيلي مخصص'}),block('p',{text:'نحو تحويل العمل المتفرق داخل الشركة إلى مركز تشغيل واضح، قابل للمتابعة، ومناسب لطريقة العمل اليومية.'}),block('metrics',{items:[['Status','Draft'],['Audience','Client'],['Scope','Phase 01'],['Format','A4 PDF']]})];return d}
const blockTypes={label:'Label',h1:'عنوان كبير',h2:'عنوان',p:'فقرة',field:'حقل',note:'ملاحظة',table:'جدول',metrics:'Metrics',cards:'Cards',pricing:'Pricing',compare:'Compare',bars:'Bars',spacer:'مسافة'};
function addBlock(type){const p=state.pages[selPage];let data={text:''}; if(type==='field')data={label:'الحقل',value:''}; if(type==='note')data={title:'ملاحظة',text:'نص الملاحظة'}; if(type==='table')data={heads:['البند','التفصيل','القيمة'],rows:[['','', '']]}; if(type==='metrics')data={items:[['Metric','100'],['Metric','80%'],['Metric','24/7'],['Metric','A4']]}; if(type==='cards')data={items:[['01','عنوان البطاقة','وصف مختصر للبطاقة.'],['02','عنوان البطاقة','وصف مختصر.'],['03','عنوان البطاقة','وصف مختصر.']]}; if(type==='pricing')data={items:[['Basic','500$','نطاق صغير واضح'],['Pro','900$','أرشفة وتنظيم'],['Custom','Scope','حسب النطاق']]}; if(type==='compare')data={rows:[['الخيار الأول','+62%','الخيار الثاني'],['أقل وضوحاً','+41%','أكثر تنظيماً']]}; if(type==='bars')data={items:[['06:30','88'],['09:00','64'],['17:00','94'],['22:00','22']]}; if(type==='spacer')data={h:12}; p.blocks.push(block(type,data)); selBlock=p.blocks.at(-1).id; render();}
function cssVars(p){let s=p.style;return `--p-bg:${s.bg};--p-text:${s.text};--p-title:${s.title};--p-muted:${s.muted};--p-accent:${s.accent};--p-hot:${s.hot};--p-border:${s.border};--p-card:${s.card};--p-soft:${s.soft};--p-table-head:${s.tableHead};--p-table-head-text:${s.tableHeadText};--p-table-cell:${s.card};--p-grid:${s.grid};--p-accent-text:#04131d;--pad-x:16mm;--pad-y:12mm;--header-h:${p.header.enabled?p.header.h:0}mm;--footer-h:${p.footer.enabled?p.footer.h:0}mm;--h-bg:${s.bg};--h-text:${s.text};--h-border:${s.accent};--h-border-w:1px;--f-bg:${s.bg};--f-text:${s.muted};--f-border:${s.border};--f-border-w:1px`}
function textEdit(value,path,ph=''){return `<span contenteditable="true" data-path="${path}" data-ph="${ph}">${esc(value)}</span>`}
function bhtml(b){let d=b.data; if(b.type==='label')return `<div class="kicker">${textEdit(d.text,`${b.id}.text`,'LABEL')}</div>`; if(b.type==='h1')return `<h1>${textEdit(d.text,`${b.id}.text`,'عنوان كبير')}</h1>`; if(b.type==='h2')return `<h2>${textEdit(d.text,`${b.id}.text`,'عنوان')}</h2>`; if(b.type==='p')return `<p>${textEdit(d.text,`${b.id}.text`,'اكتب الفقرة')}</p>`; if(b.type==='field')return `<div class="fLabel">${textEdit(d.label,`${b.id}.label`,'الحقل')}</div><div class="fValue">${textEdit(d.value,`${b.id}.value`,'القيمة')}</div>`; if(b.type==='note')return `<div class="note"><b>${textEdit(d.title,`${b.id}.title`,'عنوان')}</b><br>${textEdit(d.text,`${b.id}.text`,'النص')}</div>`; if(b.type==='table')return `<table class="table"><thead><tr>${d.heads.map((h,i)=>`<th>${textEdit(h,`${b.id}.heads.${i}`)}</th>`).join('')}</tr></thead><tbody>${d.rows.map((r,ri)=>`<tr>${r.map((c,ci)=>`<td>${textEdit(c,`${b.id}.rows.${ri}.${ci}`)}</td>`).join('')}</tr>`).join('')}</tbody></table>`; if(b.type==='metrics')return `<div class="metrics">${d.items.map((it,i)=>`<div class="metric"><div class="n">${textEdit(it[1],`${b.id}.items.${i}.1`)}</div><div class="l">${textEdit(it[0],`${b.id}.items.${i}.0`)}</div></div>`).join('')}</div>`; if(b.type==='cards')return `<div class="cards">${d.items.map((it,i)=>`<div class="card"><h3><span class="num">${textEdit(it[0],`${b.id}.items.${i}.0`)}</span>${textEdit(it[1],`${b.id}.items.${i}.1`)}</h3><p>${textEdit(it[2],`${b.id}.items.${i}.2`)}</p></div>`).join('')}</div>`; if(b.type==='pricing')return `<div class="pricing">${d.items.map((it,i)=>`<div class="priceCard"><h3>${textEdit(it[0],`${b.id}.items.${i}.0`)}</h3><div class="price">${textEdit(it[1],`${b.id}.items.${i}.1`)}</div><p>${textEdit(it[2],`${b.id}.items.${i}.2`)}</p></div>`).join('')}</div>`; if(b.type==='compare')return `<div class="compare">${d.rows.map((r,i)=>`<div class="compareRow"><div>${textEdit(r[0],`${b.id}.rows.${i}.0`)}</div><div class="delta">${textEdit(r[1],`${b.id}.rows.${i}.1`)}</div><div>${textEdit(r[2],`${b.id}.rows.${i}.2`)}</div></div>`).join('')}</div>`; if(b.type==='bars')return `<div class="barList">${d.items.map((it,i)=>`<div class="barRow"><span class="mono">${textEdit(it[0],`${b.id}.items.${i}.0`)}</span><div class="barTrack"><div class="barFill" style="width:${esc(it[1])}%"></div></div><b>${textEdit(it[1],`${b.id}.items.${i}.1`)}%</b></div>`).join('')}</div>`; if(b.type==='spacer')return `<div class="spacer" style="--spacer-h:${d.h}mm"></div>`; return ''}
function header(p,i,total){let h=p.header, m=state.meta;return `<div class="pHead ${h.enabled?'':'hide'}"><div class="hMeta">${esc(h.left||m.docNo)}<br>${esc(m.date)}</div><div class="hCenter">${esc(h.center||m.title)}</div><div class="cwLogo"><div class="cwMark"></div><b>Code<span>Works</span></b></div></div>`}
function footer(p,i,total){let f=p.footer;let rep=s=>esc((s||'').replace('{page}',i+1).replace('{total}',total));return `<div class="pFoot ${f.enabled?'':'hide'}"><span>${rep(f.right)}</span><span>${rep(f.center)}</span><span class="mono">${rep(f.left)}</span></div>`}
function render(){let c=$('#canvas');c.innerHTML=state.pages.map((p,i)=>`<section class="page ${p.grid?'grid':''} ${p.cover?'cover':''} ${i===selPage?'selected':''}" data-p="${i}" style="${cssVars(p)}"><div class="badgeOverflow">Overflow</div><div class="pageCtl"><button data-pa="add">+ صفحة</button><button data-pa="dup">نسخ</button></div>${header(p,i,state.pages.length)}<div class="pCont">${p.blocks.map(b=>`<div class="blk blk-${b.type} ${b.id===selBlock?'sel':''}" data-b="${b.id}"><div class="bTool"><button data-ba="up">↑</button><button data-ba="down">↓</button><button data-ba="del">×</button></div>${bhtml(b)}</div>`).join('')}</div>${footer(p,i,state.pages.length)}</section>`).join('');bindPanels();setTimeout(checkOverflow,50);save()}
function bindPanels(){let p=state.pages[selPage];$('#docTitle').value=state.meta.title;$('#docNo').value=state.meta.docNo;$('#docDate').value=state.meta.date;$('#stBg').value=p.style.bg;$('#stText').value=p.style.text;$('#stAccent').value=p.style.accent;$('#stTitle').value=p.style.title;$('#hLeft').value=p.header.left;$('#hCenter').value=p.header.center;$('#hRight').value=p.header.right;$('#fLeft').value=p.footer.left;$('#fCenter').value=p.footer.center;$('#fRight').value=p.footer.right}
function checkOverflow(){$$('.page').forEach(pg=>{let pc=pg.querySelector('.pCont');pg.classList.toggle('overflow',pc.scrollHeight>pc.clientHeight+2)})}
function save(){try{localStorage.setItem(LS,JSON.stringify(state))}catch(e){}}
function load(){try{let raw=localStorage.getItem(LS);if(raw){state=JSON.parse(raw);return}}catch(e){} state=fresh()}
function findBlock(id){for(let pi=0;pi<state.pages.length;pi++){let bi=state.pages[pi].blocks.findIndex(b=>b.id===id);if(bi>-1)return{p:state.pages[pi],pi,bi,b:state.pages[pi].blocks[bi]}}}
function setPath(path,val){let [id,...parts]=path.split('.');let f=findBlock(id);if(!f)return;let o=f.b.data;for(let i=0;i<parts.length-1;i++)o=o[parts[i]];o[parts.at(-1)]=val}
function moveBlock(dir){if(!selBlock)return;let f=findBlock(selBlock);if(!f)return;let a=f.p.blocks,b=a[f.bi],ni=f.bi+dir;if(ni>=0&&ni<a.length){a.splice(f.bi,1);a.splice(ni,0,b);render()}}
function templateProposal(){state=fresh();let p2=page('light');p2.blocks=[block('label',{text:'POSITIONING'}),block('h1',{text:'لماذا NAS CodeWorks؟'}),block('p',{text:'نحن لا نبدأ من اسم البرنامج. نبدأ من المشكلة التشغيلية، ثم نبني أداة مناسبة لها بنطاق واضح.'}),block('cards',{items:[['01','Operational Center','تجميع الإشارات المتفرقة في مركز واضح.'],['02','Structured Workflow','تحويل الخطوات اليومية إلى مسار قابل للمتابعة.'],['03','Practical Tools','بناء ما يحتاجه العمل فقط بدون تضخيم.']]})];let p3=page('minimal');p3.blocks=[block('label',{text:'SERVICE PATHS'}),block('h1',{text:'مسارات الخدمة'}),block('pricing',{items:[['Desktop Apps','Starting $500','أدوات داخلية مخصصة للشركات.'],['Archive Systems','Starting $900','تنظيم ملفات ومستندات ومعلومات.'],['Automation','Scope Based','تقارير وربط بيانات حسب المصادر.']]})];let p4=page('proposal');p4.blocks=[block('label',{text:'EXECUTION PIPELINE'}),block('h1',{text:'كيف ننفذ؟'}),block('cards',{items:[['01','Listen','فهم الواقع الحالي.'],['02','Define','تحديد النطاق والنتيجة.'],['03','Build','تنفيذ أداة عملية.'],['04','Validate','اختبار النتيجة داخل العمل.'],['05','Deliver','تسليم واضح وموثق.'],['06','Support','تحسينات مضبوطة.']]})];state.pages.push(p2,p3,p4);selPage=0;selBlock=null;render()}
function templateRate(){state={schemaVersion:1,meta:{title:'NAS CodeWorks Rate Card',docNo:`NCW/${new Date().getFullYear()}/RC-001`,date:today()},pages:[page('cover'),page('light'),page('minimal')]};state.pages[0].blocks=[block('label',{text:'COMMERCIAL INFRASTRUCTURE DOCUMENT'}),block('h1',{text:'جدول الخدمات والباقات التشغيلية'}),block('p',{text:'وثيقة أسعار مرجعية لخدمات NAS CodeWorks، مبنية على فهم المشكلة والنطاق قبل التنفيذ.'}),block('metrics',{items:[['Service Paths','3'],['Arabic-first','RTL'],['Scope','Defined'],['Export','A4 PDF']]})];state.pages[1].blocks=[block('label',{text:'RACK RATES'}),block('h1',{text:'الأسعار المرجعية'}),block('table',{heads:['الخدمة','الوصف','السعر'],rows:[['تطبيقات سطح مكتب','أداة داخلية مخصصة','يبدأ من 500$'],['أرشفة داخلية','تنظيم ملفات ومعلومات','يبدأ من 900$'],['تقارير وربط بيانات','حسب مصادر البيانات','بعد تحديد النطاق']] }),block('note',{title:'قاعدة التسعير',text:'السعر لا يعتمد على عدد الشاشات فقط، بل على وضوح المشكلة، تعقيد البيانات، وعدد المستخدمين.'})];state.pages[2].blocks=[block('label',{text:'GENERAL TERMS'}),block('h1',{text:'الأحكام العامة'}),block('table',{heads:['البند','التفصيل','الحالة'],rows:[['النطاق','يحدد قبل التنفيذ','إلزامي'],['البيانات','تبقى داخل بيئة العميل عند الحاجة','حسب المشروع'],['التسليم','اختبار وتشغيل وتوثيق','إلزامي']]})];selPage=0;selBlock=null;render()}
$('#palette').innerHTML=Object.entries(blockTypes).map(([k,v])=>`<button class="tool" data-add="${k}">${v}</button>`).join('');Object.entries(presets).forEach(([k,v])=>{$('#preset').insertAdjacentHTML('beforeend',`<option value="${k}">${v.name}</option>`)});
document.addEventListener('click',e=>{let pg=e.target.closest('.page');if(pg){selPage=+pg.dataset.p;if(!e.target.closest('.blk'))selBlock=null}let b=e.target.closest('.blk');if(b)selBlock=b.dataset.b;let add=e.target.closest('[data-add]');if(add)addBlock(add.dataset.add);let pa=e.target.closest('[data-pa]');if(pa){if(pa.dataset.pa==='add')state.pages.splice(selPage+1,0,page('light'));if(pa.dataset.pa==='dup'){let cp=JSON.parse(JSON.stringify(state.pages[selPage]));cp.id=uid();cp.blocks.forEach(x=>x.id=uid());state.pages.splice(selPage+1,0,cp)}render()}let ba=e.target.closest('[data-ba]');if(ba){if(ba.dataset.ba==='up')moveBlock(-1);if(ba.dataset.ba==='down')moveBlock(1);if(ba.dataset.ba==='del'&&selBlock){let f=findBlock(selBlock);f.p.blocks.splice(f.bi,1);selBlock=null;render()}}if(pg||b)render()});
document.addEventListener('input',e=>{let el=e.target;if(el.dataset.path){setPath(el.dataset.path,el.innerText);save();checkOverflow()}});
['docTitle','docNo','docDate'].forEach(id=>$('#'+id).oninput=e=>{state.meta[{docTitle:'title',docNo:'docNo',docDate:'date'}[id]]=e.target.value;render()});
['stBg','stText','stAccent','stTitle'].forEach(id=>$('#'+id).oninput=e=>{let p=state.pages[selPage],map={stBg:'bg',stText:'text',stAccent:'accent',stTitle:'title'};p.style[map[id]]=e.target.value;render()});
['hLeft','hCenter','hRight'].forEach(id=>$('#'+id).oninput=e=>{state.pages[selPage].header[{hLeft:'left',hCenter:'center',hRight:'right'}[id]]=e.target.value;render()});
['fLeft','fCenter','fRight'].forEach(id=>$('#'+id).oninput=e=>{state.pages[selPage].footer[{fLeft:'left',fCenter:'center',fRight:'right'}[id]]=e.target.value;render()});
$('#applyPreset').onclick=()=>{state.pages[selPage].style={...presets[$('#preset').value]};render()};$('#applyStyleAll').onclick=()=>{let s={...state.pages[selPage].style};state.pages.forEach(p=>p.style={...s});render()};$('#applyHeaderAll').onclick=()=>{let h={...state.pages[selPage].header};state.pages.forEach(p=>p.header={...h});render()};$('#applyFooterAll').onclick=()=>{let f={...state.pages[selPage].footer};state.pages.forEach(p=>p.footer={...f});render()};$('#toggleGrid').onclick=()=>{state.pages[selPage].grid=!state.pages[selPage].grid;render()};$('#toggleCover').onclick=()=>{state.pages[selPage].cover=!state.pages[selPage].cover;render()};$('#toggleHeader').onclick=()=>{state.pages[selPage].header.enabled=!state.pages[selPage].header.enabled;render()};$('#toggleFooter').onclick=()=>{state.pages[selPage].footer.enabled=!state.pages[selPage].footer.enabled;render()};$('#addPage').onclick=()=>{state.pages.push(page('light'));selPage=state.pages.length-1;render()};$('#delPage').onclick=()=>{if(state.pages.length>1){state.pages.splice(selPage,1);selPage=Math.max(0,selPage-1);render()}};$('#dupPage').onclick=()=>{let cp=JSON.parse(JSON.stringify(state.pages[selPage]));cp.id=uid();cp.blocks.forEach(x=>x.id=uid());state.pages.splice(selPage+1,0,cp);selPage++;render()};$('#resetDoc').onclick=()=>{if(confirm('بدء مستند جديد؟')){state=fresh();render()}};$('#blockUp').onclick=()=>moveBlock(-1);$('#blockDown').onclick=()=>moveBlock(1);$('#blockDelete').onclick=()=>{if(selBlock){let f=findBlock(selBlock);f.p.blocks.splice(f.bi,1);selBlock=null;render()}};$('#btnPrint').onclick=()=>{selBlock=null;render();setTimeout(()=>window.print(),80)};$('#btnTplProposal').onclick=templateProposal;$('#btnTplRate').onclick=templateRate;
$('#btnJsonOut').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download=(state.meta.docNo||'nas-doc').replace(/[\\/]/g,'-')+'.json';a.click()};$('#btnJsonIn').onclick=()=>$('#jsonFile').click();$('#jsonFile').onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);selPage=0;selBlock=null;render()}catch(_){alert('JSON غير صالح')}};r.readAsText(f);e.target.value=''};
load();render();window.addEventListener('resize',checkOverflow);
</script>
</body>
</html>
